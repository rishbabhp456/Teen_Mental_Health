{% extends "base.html" %}

{% block title %}Login - Teen Mental Health{% endblock %}
{% block header_title %}Welcome back{% endblock %}

{% block content %}
<div class="form-card">
    <p class="subtitle">Sign in to continue to your depression screening dashboard.</p>
    <form id="loginForm" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <i class="fas fa-user form-icon"></i>
            <input type="text" id="username" name="user_name" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <i class="fas fa-lock form-icon"></i>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p id="loginMessage" class="message"></p>
    <div class="links">
        <a href="{{ url_for('register_page') }}">Create account</a>
        <a href="{{ url_for('forgot_password_page') }}">Forgot password?</a>
    </div>
</div>
{% endblock %}
