{% extends "base.html" %}

{% block title %}Forgot Password - Teen Mental Health{% endblock %}
{% block header_title %}Reset your password{% endblock %}

{% block content %}
<div class="form-card">
    <p class="subtitle">Verify your identity and set a new password.</p>
    <form id="forgotPasswordForm" class="auth-form">
        <div class="form-group">
            <label for="user_name">Username</label>
            <i class="fas fa-user form-icon"></i>
            <input type="text" id="user_name" name="user_name" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <i class="fas fa-envelope form-icon"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <i class="fas fa-lock form-icon"></i>
            <input type="password" id="new_password" name="new_password" class="form-control" placeholder="Enter new password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    </form>
    <p id="forgotPasswordMessage" class="message"></p>
    <div class="links">
        <a href="{{ url_for('login_page') }}">Back to login</a>
    </div>
</div>
{% endblock %}
