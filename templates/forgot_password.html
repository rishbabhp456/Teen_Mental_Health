{% extends "base.html" %}

{% block title %}Forgot Password - Teen Mental Health{% endblock %}
{% block header_title %}Reset Your Password{% endblock %}

{% block content %}
<div class="form-card">
    <p class="text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
    <form id="forgotPasswordForm">
        <div class="form-group">
            <label for="email">Email</label>
            <i class="fas fa-envelope form-icon"></i>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <p id="forgotPasswordMessage" class="message"></p>
    <div class="links">
        <a href="{{ url_for('login_page') }}">Back to Login</a>
    </div>
</div>
{% endblock %}
